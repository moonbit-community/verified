name: publish-package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install MoonBit nightly
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show tool versions and update dependencies
        shell: bash
        run: |
          set -euo pipefail
          moon version --all
          moon update

      - name: Prepublish check
        shell: bash
        run: |
          set -euo pipefail
          moon check
          moon test

      - name: Publish
        # Keep the registry secret scoped to the actual publish step so the
        # validation steps run without credential access.
        env:
          SECRET: ${{ secrets.MOONCAKES_MOONBIT_COMMUNITY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$SECRET" ]; then
            echo "Error: MOONCAKES_MOONBIT_COMMUNITY_TOKEN secret is not set."
            echo "Please contact an admin to grant access to this secret."
            exit 1
          fi

          # MoonBit expects credentials at this path. We create the directory
          # and file with owner-only permissions, write the secret via stdout
          # redirection so it never appears in the job log, and always remove
          # the file on exit. On GitHub-hosted runners this is an ephemeral VM,
          # so removing the file bounds its lifetime to this step.
          install -m 700 -d ~/.moon
          install -m 600 /dev/null ~/.moon/credentials.json
          trap 'rm -f ~/.moon/credentials.json' EXIT
          printf '%s' "$SECRET" > ~/.moon/credentials.json
          moon publish
