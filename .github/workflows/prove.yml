name: Prove

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    env:
      ALTERGO_VERSION: 2.6.2
      CVC5_VERSION: 1.3.1
      Z3_VERSION: 4.15.3
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.2

      - name: Install MoonBit nightly
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install Why3 1.7.2 and Alt-Ergo 2.6.2
        run: |
          set -euo pipefail
          opam install -y why3.1.7.2 alt-ergo.${ALTERGO_VERSION}
          echo "WHY3DATA=$(opam exec -- why3 --print-datadir)" >> "$GITHUB_ENV"
          echo "WHY3LIB=$(opam exec -- why3 --print-libdir)" >> "$GITHUB_ENV"
          echo "ALTERGOPATH=$(opam exec -- sh -lc 'command -v alt-ergo')" >> "$GITHUB_ENV"

      - name: Install Z3 4.15.3 (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -o "$RUNNER_TEMP/z3.zip" \
            "https://github.com/Z3Prover/z3/releases/download/z3-${Z3_VERSION}/z3-${Z3_VERSION}-x64-glibc-2.39.zip"
          unzip -q "$RUNNER_TEMP/z3.zip" -d "$RUNNER_TEMP/z3"
          echo "Z3PATH=$(find "$RUNNER_TEMP/z3" -type f -name z3 | head -n 1)" >> "$GITHUB_ENV"

      - name: Install Z3 4.15.3 (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -o "$RUNNER_TEMP/z3.zip" \
            "https://github.com/Z3Prover/z3/releases/download/z3-${Z3_VERSION}/z3-${Z3_VERSION}-x64-osx-13.7.6.zip"
          unzip -q "$RUNNER_TEMP/z3.zip" -d "$RUNNER_TEMP/z3"
          echo "Z3PATH=$(find "$RUNNER_TEMP/z3" -type f -name z3 | head -n 1)" >> "$GITHUB_ENV"

      - name: Install CVC5 1.3.1 (Ubuntu)
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -o "$RUNNER_TEMP/cvc5.zip" \
            "https://github.com/cvc5/cvc5/releases/download/cvc5-${CVC5_VERSION}/cvc5-Linux-x86_64-static-gpl.zip"
          unzip -q "$RUNNER_TEMP/cvc5.zip" -d "$RUNNER_TEMP/cvc5"
          echo "CVC5PATH=$(find "$RUNNER_TEMP/cvc5" -type f -name cvc5 | head -n 1)" >> "$GITHUB_ENV"

      - name: Install CVC5 1.3.1 (macOS)
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -o "$RUNNER_TEMP/cvc5.zip" \
            "https://github.com/cvc5/cvc5/releases/download/cvc5-${CVC5_VERSION}/cvc5-macOS-x86_64-static-gpl.zip"
          unzip -q "$RUNNER_TEMP/cvc5.zip" -d "$RUNNER_TEMP/cvc5"
          echo "CVC5PATH=$(find "$RUNNER_TEMP/cvc5" -type f -name cvc5 | head -n 1)" >> "$GITHUB_ENV"

      - name: Update MoonBit dependencies
        run: |
          set -euo pipefail
          moon update

      - name: Show tool versions
        run: |
          set -euo pipefail
          moon version --all
          opam exec -- why3 --version
          "$ALTERGOPATH" --version | grep -F "${ALTERGO_VERSION}"
          "$CVC5PATH" --version | grep -F "version ${CVC5_VERSION}"
          "$Z3PATH" --version | grep -F "${Z3_VERSION}"

      - name: Bundle core library
        run: |
          set -euo pipefail
          moon -C "$HOME/.moon/lib/core" bundle --all

      - name: Run proofs
        env:
          ALTERGOPATH: ${{ env.ALTERGOPATH }}
          CVC5PATH: ${{ env.CVC5PATH }}
          WHY3DATA: ${{ env.WHY3DATA }}
          WHY3LIB: ${{ env.WHY3LIB }}
          Z3PATH: ${{ env.Z3PATH }}
        run: |
          set -euo pipefail
          # First invocation: let `moon prove` generate _build/verif/why3.conf.
          # We let it run to completion; the timeout failure on the slow
          # sparse_array goal is expected here and will be cleared on the
          # second pass.
          opam exec -- moon prove || true
          # Append a fourth strategy tier with a generous 90s budget. Crucially
          # we APPEND rather than replace the existing 2s tier — goals that
          # already succeeded in the 2s tier will not re-run, so we avoid the
          # solver-flake risk that comes from raising existing tier limits.
          # Only goals that fail every prior tier reach this new tier.
          perl -i -pe '
            s{(c Alt-Ergo,([0-9.]+) 2 4000 \| c Z3,([0-9.]+) 2 4000 \| c CVC5,([0-9.]+) 2 4000)}
             {$1\nc Alt-Ergo,$2 90 4000 | c Z3,$3 90 4000 | c CVC5,$4 90 4000}
          ' _build/verif/why3.conf
          opam exec -- moon prove --why3-config _build/verif/why3.conf

      - name: Upload proof reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: proof-reports-${{ matrix.os }}
          path: |
            _build/verif/**/*.proof.json
            _build/verif/**/*.mlw
            _build/verif/why3.conf
